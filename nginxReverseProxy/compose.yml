services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: NGINX-ProxyManager
    restart: unless-stopped
    ports:
      - '82:80'
      - '81:81'
      - '444:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
